content:
  - name: brands
    label: Brands
    type: collection
    path: src/brands
    view:
      fields: [name, industry, headquarters, show_in_marquee, careers_url, draft]
      primary: name
      sort: [name]
    fields:
      - { name: name, label: Brand name, type: string, required: true }
      - name: logo
        label: Logo URL
        type: string
        description: Upload the logo to Cloudflare R2 and paste its public URL here.
      - name: avatar_background
        label: Logo avatar background
        type: string
        default: "#ffffff"
        pattern:
          regex: "^#[0-9a-fA-F]{6}$"
          message: Enter a six-digit hex color, such as #ffffff.
        description: Used behind the logo in circular and avatar-style placements.
      - name: show_in_marquee
        label: Show in homepage marquee
        type: boolean
        default: false
        description: Include this brand's logo in the moving strip below the homepage hero.
      - name: industry
        label: Industry
        type: select
        options:
          values:
            - Apparel & footwear
            - Beauty & personal care
            - Brand & creative studio-first shops
            - Food & beverage
            - Full-funnel creative/performance
            - Home & lifestyle
            - Performance creative / paid social specialists
            - UGC / content-native
            - Wellness / supplements
      - { name: headquarters, label: Headquarters location, type: string }
      - { name: website, label: Website, type: string }
      - { name: careers_url, label: Careers page URL, type: string }
      - { name: description, label: Short description, type: text }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: body, label: About the brand, type: rich-text }

  - name: jobs
    label: Jobs
    type: collection
    path: src/jobs
    view:
      fields: [title, brand, location, employment_type, posted, draft]
      primary: title
      sort: [posted, title]
      default:
        sort: posted
        order: desc
    fields:
      - { name: title, label: Job title, type: string, required: true }
      - name: brand
        label: Brand
        type: reference
        required: true
        options:
          collection: brands
          value: "{filename}"
          label: "{name}"
      - { name: location, label: Location, type: string, required: true }
      - name: workplace
        label: Workplace
        type: select
        options:
          values: [Remote, Hybrid, On-site]
      - name: employment_type
        label: Employment type
        type: select
        options:
          values: [Full-time, Part-time, Contract, Freelance, Internship]
      - { name: salary, label: Salary, type: string }
      - { name: apply_url, label: Application URL, type: string, required: true }
      - { name: posted, label: Posted, type: date, required: true }
      - { name: featured, label: Featured, type: boolean, default: false }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: source_url, label: Source URL, type: string }
      - { name: source_job_id, label: Source job ID, type: string }
      - { name: source_title, label: Original job title, type: string }
      - { name: discovered_at, label: Discovered, type: date }
      - { name: last_seen_at, label: Last seen, type: date }
      - { name: body, label: Description, type: rich-text }

  - name: job-drafts
    label: Jobs to review
    type: collection
    path: src/job-drafts
    exclude: [.gitkeep]
    view:
      fields: [title, brand, location, discovered_at, review_status]
      primary: title
      sort: [discovered_at, title, brand]
      default:
        sort: discovered_at
        order: desc
    operations:
      delete: true
    fields:
      - { name: title, label: Job title, type: string, required: true }
      - name: brand
        label: Brand
        type: reference
        required: true
        options:
          collection: brands
          value: "{filename}"
          label: "{name}"
      - { name: location, label: Location, type: string, required: true }
      - name: workplace
        label: Workplace
        type: select
        options:
          values: [Remote, Hybrid, On-site]
      - name: employment_type
        label: Employment type
        type: select
        options:
          values: [Full-time, Part-time, Contract, Freelance, Internship]
      - { name: salary, label: Salary, type: string }
      - { name: apply_url, label: Application URL, type: string, required: true }
      - { name: posted, label: Posted, type: date, required: true }
      - { name: featured, label: Featured, type: boolean, default: false }
      - { name: draft, label: Draft, type: boolean, default: true, readonly: true }
      - name: review_status
        label: Review status
        type: select
        required: true
        options:
          values:
            - { name: needs-review, label: Needs review }
            - { name: approved, label: Approved }
            - { name: rejected, label: Rejected }
      - { name: source_url, label: Source URL, type: string, required: true }
      - { name: source_job_id, label: Source job ID, type: string }
      - { name: source_title, label: Original job title, type: string }
      - { name: discovered_at, label: Discovered, type: date, required: true }
      - { name: last_seen_at, label: Last seen, type: date }
      - name: match_keywords
        label: Match keywords
        type: string
        list: true
      - { name: body, label: Description, type: rich-text }

  - name: settings
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - { name: name, label: Site name, type: string }
      - { name: description, label: Description, type: text }
      - { name: email, label: Contact email, type: string }

  - name: home
    label: Homepage
    type: file
    path: src/index.njk
    fields:
      - { name: title, label: Page title, type: string }
      - { name: intro, label: Intro, type: text }
      - { name: body, label: Content, type: code, options: { format: html } }
